name: 数据库备份（无权限错误）

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt install -y mysql-client

      - name: 备份数据库
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          mysqldump -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASS }} ${{ secrets.DB_NAME }} | gzip > backup_$DATE.sql.gz

      - name: 提交并推送
        uses: EndBug/add-and-commit@v9
        with:
          message: "数据库备份 ${{ env.DATE }}"
          add: "*.sql.gz"
