name: 自动备份MySQL数据库

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 屏蔽Node警告
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: 安装MySQL客户端
        run: sudo apt install -y mysql-client

      - name: 备份数据库
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M-%S)
          mysqldump -h ${{ secrets.DB_HOST }} \
                    -u ${{ secrets.DB_USER }} \
                    -p${{ secrets.DB_PASS }} \
                    ${{ secrets.DB_NAME }} | gzip > backup_$DATE.sql.gz

      - name: 上传备份文件
        run: |
          git config --global user.name "Backup Bot"
          git config --global user.email "actions@github.com"
          git add *.sql.gz
          git commit -m "数据库备份 $DATE"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
