name: 数据库备份（纯原生 无警告）

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        run: |
          git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          git config user.name "Backup"
          git config user.email "actions@github.com"

      - name: 安装 MySQL
        run: sudo apt install -y mysql-client

      - name: 备份数据库
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          mysqldump -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASS }} ${{ secrets.DB_NAME }} | gzip > backup_$DATE.sql.gz

      - name: 上传文件
        run: |
          git add *.sql.gz
          git commit -m "备份 $DATE"
          git push
