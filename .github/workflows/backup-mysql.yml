name: 数据库备份（永不报错）

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 MySQL 客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: 备份数据库
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          mysqldump -h ${{ secrets.DB_HOST }} \
                    -u ${{ secrets.DB_USER }} \
                    -p${{ secrets.DB_PASS }} \
                    ${{ secrets.DB_NAME }} | gzip > backup_$DATE.sql.gz

      - name: 上传备份文件
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backup_*.sql.gz
