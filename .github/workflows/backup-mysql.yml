name: MySQL备份 100%成功版
on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: sudo apt update && sudo apt install -y mysql-client

      - name: 备份（强力兼容版）
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          mysqldump -h ${{ secrets.DB_HOST }} \
                    -u ${{ secrets.DB_USER }} \
                    -p'${{ secrets.DB_PASS }}' \
                    --single-transaction \
                    --skip-lock-tables \
                    ${{ secrets.DB_NAME }} > backup_$DATE.sql
          gzip backup_$DATE.sql

      - name: 上传文件
        uses: actions/upload-artifact@v4
        with:
          name: backup
          path: backup_*.sql.gz
